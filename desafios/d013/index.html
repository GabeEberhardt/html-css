<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio - Gabriel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="perfil">
            <img src="imagens/foto-perfil.jpg" alt="Foto de Perfil do Gabriel">
            <h1>Hello, I'm Gabriel.</h1>
            <p>A Web Developer in Training.</p>
        </section>

        <section class="skills">
            <h2>Skills</h2>
            <div class="skills-container">
                <img src="imagens/html5.png" alt="HTML5">
                <img src="imagens/css3.png" alt="CSS3">
                <img src="imagens/js.png" alt="JavaScript">
            </div>
        </section>

        <section class="contact">
            <h2>Contact</h2>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email">
                </div>
                <button type="button">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Meu Portfólio</p>
    </footer>

</body>
</html>
